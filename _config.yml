title: R. Prabakaran
url: "https://rpkarandev.github.io"
baseurl: ""

description: >-
  R. Prabakaran — computational biologist developing machine learning and biological
  language models for protein function prediction, metagenomic annotation, molecular
  evolution, and protein aggregation.

author: R. Prabakaran
lang: en

# Toggle Google Scholar citation metrics, graph, and per-paper badges site-wide
show_citations: true

theme: minima
markdown: kramdown
#ins_logo: "./bits-logo.png"

minima:
  skin: classic
  custom_css:
    - assets/style.css

# Social profiles for SEO / JSON-LD (sameAs)
social:
  name: R. Prabakaran
  links:
    - https://orcid.org/0000-0002-0172-3716
    - https://scholar.google.com/citations?user=7aAKswUAAAAJ&hl=en
    - https://www.linkedin.com/in/prabakaran-ramakrishnan-87792418/
    - https://github.com/rpkarandev

twitter:
  card: summary

# Default Open Graph image used for link previews
defaults:
  - scope:
      path: ""
    values:
      image: /assets/imgs/prof1.png

tracking_id: #

footer: yes
footer_url: "https://github.com/rpkarandev"
footer_text: ""

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# Keep unused vendor libraries and tooling out of the built site
exclude:
  - assets/vendor/owl.carousel
  - assets/vendor/venobox
  - assets/vendor/icofont
  - assets/vendor/isotope-layout
  - assets/vendor/jquery
  - assets/vendor/jquery.easing
  - assets/vendor/waypoints
  - assets/vendor/counterup
  - assets/vendor/php-email-form
  - assets/vendor/fontawesomes
  - tools
  - Gemfile
  - Gemfile.lock
  - README.md

sass:
    style: compressed
    sass_dir: _sass

scholar:
  style: modern-language-association
  bibliography_template: bib
